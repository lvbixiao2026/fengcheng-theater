<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=0.5, minimum-scale=0.2, maximum-scale=3.0, user-scalable=yes">
<title>凤城剧院座次表</title>
<style>
:root{--bg:#1a1a2e;--accent:#e8b86d;--text:#e0e0e0;--sub:#888;--free-bg:#2d4a3e;--free-bd:#4caf84;--free-tx:#81c784;--mine-bg:#1a3a5c;--mine-bd:#42a5f5;--mine-tx:#90caf9;--taken-bg:#3a2a1a;--taken-bd:#a06020;--taken-tx:#e8b86d;--bad-bg:#4a2020;--bad-bd:#8b3a3a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:10px 8px 90px;display:flex;flex-direction:column;align-items:center;gap:10px}
h1{font-size:22px;color:var(--accent);text-align:center}
.sub{color:var(--sub);font-size:12px;text-align:center}
.stage{background:#1b3a5c;color:var(--accent);padding:6px 60px;border-radius:6px;font-size:13px}
.bar{font-size:13px;color:var(--sub);text-align:center}
.bar .val{color:var(--accent);font-weight:700}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;font-size:11px;color:var(--sub)}
.legend i{display:inline-block;width:16px;height:16px;border-radius:3px;border:2px solid;vertical-align:-3px;margin-right:3px}
.legend .lf{background:var(--free-bg);border-color:var(--free-bd)}
.legend .lm{background:var(--mine-bg);border-color:var(--mine-bd)}
.legend .lt{background:var(--taken-bg);border-color:var(--taken-bd)}
.legend .lb{background:var(--bad-bg);border-color:var(--bad-bd)}
.legend .ll{background:#3a2a1a;border-color:#8b6914}

.grid-wrap{overflow-x:auto;width:100%;-webkit-overflow-scrolling:touch;padding:5px 0}
#seatGrid{display:flex;flex-direction:column;gap:2px;width:fit-content;margin:0 auto;background:#0f1923;border-radius:10px;padding:12px 14px;border:1px solid #1a2a3a}

.seat-row{display:grid;align-items:center;gap:1px}
.row-label{grid-column:1;grid-row:1;text-align:right;padding-right:4px;font-size:10px;font-weight:600;color:var(--sub)}
.seat{width:22px;height:22px;border-radius:3px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;cursor:pointer;transition:transform .12s;user-select:none;flex-shrink:0;position:relative;-webkit-tap-highlight-color:transparent}
.seat::before{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px}
.seat.free{background:var(--free-bg);border-color:var(--free-bd);color:var(--free-tx)}
.seat.free:hover{transform:scale(1.2);z-index:1;box-shadow:0 0 6px rgba(76,175,132,.5)}
.seat.mine{background:var(--mine-bg);border-color:var(--mine-bd);color:var(--mine-tx);transform:scale(1.08);box-shadow:0 0 6px rgba(66,165,245,.4)}
.seat.taken{background:var(--taken-bg);border-color:var(--taken-bd);color:var(--taken-tx);cursor:not-allowed}
.seat.bad{background:var(--bad-bg);border-color:var(--bad-bd);cursor:not-allowed}
.seat.lighting{background:#3a2a1a;border-color:#8b6914;color:#8b6914;cursor:default}
.seat.aisle{background:#2a3a2a;border:1px dashed #3a5a3a;cursor:default;pointer-events:none}

.panel{position:fixed;bottom:0;left:0;right:0;background:#16213e;border-top:1px solid #2a4560;padding:10px 12px;z-index:100;display:none;align-items:center;gap:8px;justify-content:center;box-shadow:0 -4px 16px rgba(0,0,0,.5)}
.panel span{color:var(--accent);font-weight:700;font-size:14px}
.panel input{flex:1;max-width:180px;background:#1e3050;border:1px solid #2a4560;color:var(--text);padding:8px 10px;border-radius:6px;font-size:15px;outline:none}
.panel input:focus{border-color:#42a5f5}
.panel input::placeholder{color:#555}
.panel button{padding:8px 16px;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
.btn-ok{background:#d4a030;color:#1a1a2e}.btn-ok:disabled{opacity:.4}
.btn-cancel{background:#2a3a50;color:#aaa}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}.toast.err{background:#5c2a2a}

.wechat-guide{background:#3a2010;border:1px solid #d4a030;color:#e8b86d;padding:8px 14px;border-radius:6px;font-size:12px;text-align:center;max-width:500px;width:100%}

@media(max-width:768px){
  .seat{width:20px;height:20px;font-size:6px}
  .row-label{font-size:8px}
  .seat::before{top:-10px;left:-10px;right:-10px;bottom:-10px}
}
</style>
</head>
<body>
<div class="container">
<h1>🎭 凤城剧院座次表</h1>
<p class="sub">点击勾选多个座位 · 输入微信名 · 一次性确认（最多5座）</p>
<div class="wechat-guide" id="wcGuide">
  ⚠️ 微信内无法直接打开？请点右上角 <b>···</b> → <b>在浏览器中打开</b>
  <button onclick="this.parentNode.style.display='none'" style="margin-left:8px;background:none;border:1px solid #888;color:#888;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer">✕</button>
</div>
<div class="stage">⬆ 舞 台 ⬆</div>
<div class="bar">已选：<span class="val" id="cnt">0</span> / 557 座</div>
<div class="my-info" id="myInfo" style="display:none;text-align:center;color:var(--accent);font-size:14px;font-weight:700;background:#1a3a5c;padding:6px 16px;border-radius:6px;border:1px solid #2a5a8a"></div>
<div class="legend">
<span><i class="lf"></i>可选</span><span><i class="lm"></i>我的</span><span><i class="lt"></i>已选</span><span><i class="lb"></i>坏座</span><span><i class="ll"></i>灯光区</span>
</div>
<div class="grid-wrap"><div id="seatGrid"></div></div>
</div>
<div class="panel" id="panel">
<span id="pnlSeat"></span>
<input id="pnlName" placeholder="输入你的微信名或姓名" maxlength="20" autocomplete="off">
<button class="btn-ok" id="btnOk" onclick="confirmSeat()">确认选座</button>
<button class="btn-cancel" id="btnCancelSeat" style="display:none" onclick="cancelMySeat()">取消选座</button>
<button class="btn-cancel" id="btnCancel" onclick="cancelPick()">取消</button>
</div>
<div style="display:none;text-align:center;font-size:11px;color:#888;margin-top:4px" id="pickHint">点取消可继续添加座位</div>
<div class="toast" id="toast"></div>

<script src="seats_data.js"></script>
<script>
// === Load MQTT ===
(function(){
  var s=document.createElement('script');
  s.src='mqtt.min.js';
  s.onerror=function(){
    s.src='https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js';
  };
  s.onload=initMQTT;
  document.head.appendChild(s);
})();

var seatState={}, myPicks=[], cancelTarget=null, client;

// Remember user's own seats across sessions
var myName=localStorage.getItem('fc_myName')||'';
var mySeatIds=JSON.parse(localStorage.getItem('fc_mySeats')||'[]');

// Render now, then load MQTT
render();

function initMQTT(){
  if(typeof mqtt!=='undefined'){
    client=mqtt.connect('wss://broker.hivemq.com:8884/mqtt',{
      clientId:'fc-'+Math.random().toString(36).slice(2,8),
      clean:true,connectTimeout:1e4,reconnectPeriod:3000
    });
    client.on('connect',function(){client.subscribe('fengcheng-theater-557/seat/#',{qos:1})});
    client.on('message',function(t,m){var id=t.toString().replace('fengcheng-theater-557/seat/','');var p=m.toString();if(!p||p==='null')delete seatState[id];else try{seatState[id]=JSON.parse(p)}catch(e){}render()});
    client.on('error',function(e){console.warn('MQTT:',e)});
  }else{
    client={publish:function(){}};
  }
  render();
}

// ====== 更新顶部「我的座位」提示 ======
function updateMyInfo(){
  var el=document.getElementById('myInfo');
  if(!el)return;
  if(!myName){el.style.display='none';return}
  // Find all seats belonging to this user in seatState
  var mine=[];
  Object.entries(seatState).forEach(function(e){
    if(e[1].name===myName) mine.push(e[0].replace('-','')+'号');
  });
  // Also check localStorage seats (even before MQTT loads)
  if(mine.length===0 && mySeatIds.length){
    mine=mySeatIds.map(function(s){return s.replace('-','')+'号'});
  }
  if(mine.length===0){el.style.display='none';return}
  el.style.display='block';
  el.innerHTML='我的座位：'+mine.join(' + ')+' <span style="font-size:11px;color:#90caf9">('+myName+')</span> <span style="font-size:11px;color:#888">最多5座</span>';
}

function render(){
  var g=document.getElementById('seatGrid');
  if(!g)return;
  g.innerHTML='';
  var cols=typeof GRID_COLS!=='undefined'?GRID_COLS:36;
  var cellW=window.innerWidth<769?'20px':'22px';
  var lblW=window.innerWidth<769?'30px':'36px';

  SEAT_DATA.forEach(function(rd){
    if(rd.type==='aisle'){
      var d=document.createElement('div');
      d.className='seat-row';
      d.style.gridTemplateColumns=lblW+' repeat('+cols+','+cellW+')';
      d.innerHTML='<span style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:48px;background:#1a3020;border-top:2px solid #4a7a4a;border-bottom:2px solid #4a7a4a;color:#7ab87a;font-size:14px;letter-spacing:10px;font-weight:700;margin:8px 0">⬇  过  道  ⬇</span>';
      g.appendChild(d);return;
    }
    var row=document.createElement('div');
    row.className='seat-row';
    row.style.gridTemplateColumns=lblW+' repeat('+cols+','+cellW+')';
    var lbl=document.createElement('div');
    lbl.className='row-label';lbl.textContent=rd.label;
    row.appendChild(lbl);
    var map={};
    rd.seats.forEach(function(s){map[s.col]=s});
    for(var c=0;c<cols;c++){
      var s=map[c],el=document.createElement('div');
      el.style.gridColumn=c+2;
      if(!s){el.style.width=cellW;el.style.height=cellW;row.appendChild(el);continue}
      if(s.type==='aisle'){el.className='seat aisle';row.appendChild(el);continue}
      if(s.type==='bad'){el.className='seat bad';el.title='损坏';row.appendChild(el);continue}
      if(s.type==='lighting'){el.className='seat lighting';el.title='灯光区';row.appendChild(el);continue}

      var id=rd.label+'-'+s.number,st=seatState[id],cls='free',title=rd.label+s.number+'号';
      if(st){cls='taken';title+=' — '+(st.name||'已选')}else if(myPicks.indexOf(id)>=0){cls='mine';title+=' — 待确认'}
      // Highlight if this is the user's own confirmed seat
      if(myName && st && st.name===myName) cls='mine';
      el.className='seat '+cls;
      if(!st)el.textContent=s.number;
      el.title=title;
      (function(i,l,n){el.onclick=function(){onSeat(i,l,n)}})(id,rd.label,s.number);
      row.appendChild(el);
    }
    g.appendChild(row);
  });
  document.getElementById('cnt').textContent=Object.keys(seatState).length;
  // Show my seat info bar
  updateMyInfo();
}

function onSeat(id,row,num){
  var st=seatState[id];
  // If user clicks on their own confirmed seat, show cancel option
  if(st && myName && st.name===myName){
    hidePanel();
    cancelTarget=id;
    var p=document.getElementById('panel');
    p.style.display='flex';
    document.getElementById('pnlSeat').textContent='取消选座：'+row+num+'号 ('+myName+')';
    document.getElementById('pnlName').style.display='none';
    document.getElementById('btnOk').style.display='none';
    document.getElementById('btnCancelSeat').style.display='inline-block';
    document.getElementById('btnCancel').style.display='inline-block';
    return
  }
  if(st){toast(row+num+'号 已被'+(st.name||'他人')+'选',1);return}
  // Toggle: if already picked, remove; else add (max 5)
  var idx=myPicks.indexOf(id);
  if(idx>=0){myPicks.splice(idx,1);render();updatePickPanel();return}
  if(myPicks.length>=5){toast('最多一次选5座',1);return}
  myPicks.push(id);render();
  updatePickPanel();
}

function updatePickPanel(){
  cancelTarget=null;
  document.getElementById('pnlName').style.display='';
  document.getElementById('btnOk').style.display='';
  document.getElementById('btnCancelSeat').style.display='none';
  document.getElementById('btnCancel').style.display='';
  var p=document.getElementById('panel');
  var cnt=myPicks.length;
  if(cnt===0){hidePanel();return}
  p.style.display='flex';
  document.getElementById('pnlSeat').textContent='已选 '+cnt+'/5 座';
  document.getElementById('btnOk').disabled=false;
  // Show picked seat names
  var labels=[];
  myPicks.forEach(function(sid){labels.push(sid.replace('-','')+'号')});
  document.getElementById('pnlSeat').textContent='已选 '+cnt+'/5 座：'+labels.join(', ');
  document.getElementById('pickHint').style.display=cnt<5?'block':'none';
  document.getElementById('pnlName').focus();
}

function confirmSeat(){
  var n=document.getElementById('pnlName').value.trim();
  if(!n){toast('请输入微信名',1);return}
  if(myPicks.length===0){return}
  // Count how many seats this name already has
  var myCount=0;
  Object.values(seatState).forEach(function(v){if(v.name===n)myCount++});
  if(myCount+myPicks.length>5){toast(n+' 已有 '+myCount+' 座，加上这 '+myPicks.length+' 座超过5座上限',1);return}
  // If name changed from previous, reset localStorage
  if(n!==myName){myName=n;mySeatIds=[];localStorage.setItem('fc_myName',n);localStorage.setItem('fc_mySeats','[]')}
  document.getElementById('btnOk').disabled=true;
  // Confirm all picked seats at once
  var ids=myPicks.slice();
  myPicks=[];hidePanel();
  ids.forEach(function(sid){
    var p=JSON.stringify({name:n,ts:Date.now()});
    client.publish('fengcheng-theater-557/seat/'+sid,p,{qos:1,retain:true});
    if(typeof mqtt==='undefined')seatState[sid]={name:n,ts:Date.now()};
    if(mySeatIds.indexOf(sid)<0)mySeatIds.push(sid);
  });
  myName=n;
  localStorage.setItem('fc_myName',n);
  localStorage.setItem('fc_mySeats',JSON.stringify(mySeatIds));
  toast('已选 '+ids.length+' 座 → '+n);
  render();
}

function cancelPick(){myPicks=[];render();hidePanel()}

function cancelMySeat(){
  if(!cancelTarget)return;
  var sid=cancelTarget;
  cancelTarget=null;hidePanel();
  // Publish null to remove from MQTT
  client.publish('fengcheng-theater-557/seat/'+sid,null,{qos:1,retain:true});
  delete seatState[sid];
  // Remove from localStorage
  var idx=mySeatIds.indexOf(sid);
  if(idx>=0){mySeatIds.splice(idx,1);localStorage.setItem('fc_mySeats',JSON.stringify(mySeatIds))}
  toast('已取消 '+sid.replace('-','')+'号');
  render();
}
function hidePanel(){document.getElementById('panel').style.display='none';document.getElementById('pnlName').value='';var h=document.getElementById('pickHint');if(h)h.style.display='none'}
function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2200)}
document.getElementById('pnlName').addEventListener('keydown',function(e){if(e.key==='Enter')confirmSeat()});
</script>
</body>
</html>
